x-common-env: &common-env
    ASPNETCORE_ENVIRONMENT: Docker

x-healthcheck: &default-healthcheck
  test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/health"]
  interval: 30s
  timeout: 3s
  retries: 3

services:
  # --- ASP.NET ---
  gateway:
    container_name: diploma-gateway
    build:
      context: ./src/server
      dockerfile: Gateway/Dockerfile
    ports:
      - "5050:8080"
    depends_on:
      - auth
      - collector
      #- processor
      - scheduler
      - storage
    networks:
      - public
      - internal
    env_file: .env
    environment:
      <<: *common-env

  analyze:
    container_name: diploma-analyze
    build:
      context: ./src/server
      dockerfile: AnalyzeService/Dockerfile
    # depends_on:
      
    networks:
      - internal
    healthcheck: *default-healthcheck
    env_file: .env
    environment:
      <<: *common-env

  auth:
    container_name: diploma-auth
    build:
      context: ./src/server
      dockerfile: AuthService/Dockerfile
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
    healthcheck: *default-healthcheck
    env_file: .env
    environment:
      <<: *common-env

  collector:
    container_name: diploma-collector
    build:
      context: ./src/server
      dockerfile: CollectorService/Dockerfile
    volumes:
      - ./plugins_data:/app/Plugins  # Монтуємо локальну папку в контейнер
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - internal
    healthcheck: *default-healthcheck
    env_file: .env
    environment:
      <<: *common-env

  scheduler:
    container_name: diploma-scheduler
    build:
      context: ./src/server
      dockerfile: SchedulerService/Dockerfile
    depends_on:
      rabbitmq:
        condition: service_healthy
      mongo:
        condition: service_healthy
    networks:
      - internal
    healthcheck: *default-healthcheck
    env_file: .env
    environment:
      <<: *common-env

  storage:
    container_name: diploma-storage
    build:
      context: ./src/server
      dockerfile: StorageService/Dockerfile
    depends_on:
      rabbitmq:
        condition: service_healthy
      mongo:
        condition: service_healthy
    networks:
      - internal
    healthcheck: *default-healthcheck
    env_file: .env
    environment:
      <<: *common-env

  # --- Others ---
  rabbitmq:
    container_name: diploma-rabbitmq
    image: rabbitmq:4.2-management
    ports:
      - "5672:5672"
    networks:
      - internal
    environment:
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_DEFAULT_USER=${RABBITMQ__USER}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ__PASS}
    healthcheck:
      test: ["CMD", "rabbitmqctl", "status"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo:
    container_name: diploma-mongo
    image: mongo:8.0
    ports:
      - "${MONGO__PORT}:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO__USER}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO__PASS}
    networks:
      - internal
      - public
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')", "-u", "${MONGO__USER}", "-p", "${MONGO__PASS}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    container_name: diploma-redis
    image: redis:alpine
    ports:
      - "${REDIS__PORT}:6379"
    command: redis-server --requirepass ${REDIS__PASS}
    networks:
      - internal
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS__PASS}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mongo_data:
  redis_data:

networks:
  public:
  internal:
