version: "3"

tasks:
  up-rr:
    desc: Start redis, rabbitmq containers
    cmds:
      - docker compose up -d redis rabbitmq

  up-deps:
    desc: Start redis, mongo, rabbitmq and mongo-express containers
    cmds:
      - docker compose up -d redis mongo rabbitmq mongo-express

  up-frontend:
    desc: Start only frontend container
    cmds:
      - docker compose up -d frontend

  up-aspnet:
    desc: Start all containers from compose project
    cmds:
      - docker compose up -d gateway analyze auth collector storage scheduler

  up-all:
    desc: Start all containers from compose project (except mongo)
    deps: [up-rr, up-aspnet, up-frontend]

  up-all-mongo:
    desc: Start all containers from compose project
    cmds:
      - docker compose up -d

  stop:
    desc: Stop all containers from compose project
    cmds:
      - docker compose stop
